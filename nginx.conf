limit_req_zone $binary_remote_addr zone=app_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=asset_limit:10m rate=100r/s;

server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location /assets/ {
        limit_req zone=asset_limit burst=50 nodelay;
        limit_req_status 429;

        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?|ttf|eot|map)$ {
        limit_req zone=asset_limit burst=50 nodelay;
        limit_req_status 429;

        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }


    location = /index.html {
        limit_req zone=app_limit burst=10 nodelay;
        limit_req_status 429;

        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    location / {
        limit_req zone=app_limit burst=20 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/manifest+json;
}